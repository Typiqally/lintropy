site_name: Lintropy
site_description: Repo-local linting for rules your codebase actually cares about.
site_url: https://typiqally.github.io/lintropy/
repo_url: https://github.com/Typiqally/lintropy
repo_name: Typiqally/lintropy
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  logo: null
  favicon: null
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - search.share
  palette:
    scheme: slate
    primary: black
    accent: green

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Typiqally/lintropy
      name: Lintropy on GitHub

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Start here:
      - Overview: overview.md
      - Getting started: getting-started.md
  - Reference:
      - Configuration: configuration.md
      - Rule language: rule-language.md
      - CLI guide: cli.md
  - Integrations:
      - integrations/index.md
      - VS Code & Cursor: integrations/vscode.md
      - JetBrains IDEs: integrations/jetbrains.md
      - Claude Code: integrations/claude-code.md
      - Other LSP editors: integrations/other-editors.md
      - Other agents: integrations/other-agents.md
      - Post-write hook: integrations/post-write-hook.md
  - Support:
      - Troubleshooting: troubleshooting.md
