name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build, e.g. v0.1.0"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --locked --bin lintropy --target "$TARGET"

      - name: Resolve version
        id: ver
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-$REF_NAME}"
          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Refusing invalid tag: $TAG" >&2; exit 1 ;;
          esac
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package tarball
        id: pkg
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          NAME="lintropy-${VERSION}-${TARGET}"
          STAGE="dist/$NAME"
          mkdir -p "$STAGE"
          cp "target/${TARGET}/release/lintropy" "$STAGE/"
          cp README.md "$STAGE/" 2>/dev/null || true
          cp LICENSE "$STAGE/" 2>/dev/null || true
          cp LICENSE-MIT "$STAGE/" 2>/dev/null || true
          tar -C dist -czf "dist/$NAME.tar.gz" "$NAME"
          shasum -a 256 "dist/$NAME.tar.gz" > "dist/$NAME.tar.gz.sha256"
          echo "archive=dist/$NAME.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha=dist/$NAME.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: lintropy-${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.sha }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Resolve tag
        id: ver
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-$REF_NAME}"
          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Refusing invalid tag: $TAG" >&2; exit 1 ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

  bump-tap:
    name: bump homebrew tap
    needs: release
    runs-on: ubuntu-latest
    # Only auto-bump the tap when a real git tag was pushed. Manual
    # workflow_dispatch runs still publish the GH release, but they do
    # not bump the Homebrew formula.
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Resolve tag
        id: ver
        env:
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="$REF_NAME"
          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Refusing invalid tag: $TAG" >&2; exit 1 ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Dispatch to homebrew-lintropy
        env:
          GH_TOKEN: ${{ secrets.TAP_DISPATCH_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "TAP_DISPATCH_TOKEN secret not set; skipping tap bump." >&2
            exit 0
          fi
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            /repos/Typiqally/homebrew-lintropy/dispatches \
            -f event_type=bump-formula \
            -f "client_payload[tag]=$TAG"
