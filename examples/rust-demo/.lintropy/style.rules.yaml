rules:
  - id: no-todo
    include: ["tests/**/*.rs"]
    message: "remove TODO comment before merge"
    language: rust
    query: |
      ((line_comment) @match
        (#match? @match "TODO"))

  - id: user-use-builder
    include: ["src/**/*.rs"]
    message: "build `User` with `User::builder()`; direct struct literal bypasses validation"
    language: rust
    query: |
      (struct_expression
        name: (type_identifier) @ty
        (#eq? @ty "User")
        (#not-has-ancestor? @ty "call_expression" "arguments")) @match
